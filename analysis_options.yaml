# Configuração do analisador estático do NoxPass.
# Lint rigoroso — segurança e legibilidade acima de conveniência.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Tratar como erro (falha o CI), não apenas aviso.
    invalid_annotation_target: ignore
    todo: ignore
  exclude:
    # Arquivos gerados por build_runner (freezed / json / riverpod / drift).
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_slow_async_io
    - cancel_subscriptions
    - close_sinks
    - prefer_single_quotes
    - prefer_final_locals
    - prefer_const_constructors
    - prefer_const_declarations
    - require_trailing_commas
    - unawaited_futures
    - use_key_in_widget_constructors
