name: noxpass
description: "NoxPass - Gerenciador de senhas e segredos Zero-Knowledge, Offline-First."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Estado & navegação ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # --- Modelos / serialização ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # --- Banco de dados (Drift + SQLCipher) ---
  drift: ^2.21.0
  sqlite3: ^2.4.6
  # SQLCipher substitui o sqlite3_flutter_libs (mesmo namespace nativo — não
  # podem coexistir). Traz o SQLite com SQLCipher para cifrar o banco inteiro.
  sqlcipher_flutter_libs: ^0.6.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # --- Criptografia ---
  cryptography: ^2.7.0
  cryptography_flutter: ^2.3.2

  # --- Armazenamento seguro & biometria ---
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # --- Backup: compartilhar e selecionar arquivos ---
  share_plus: ^10.1.2
  file_selector: ^1.0.3

  # --- Utilitários ---
  intl: ^0.19.0
  collection: ^1.19.0
  uuid: ^4.5.1
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Geração de código ---
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  drift_dev: ^2.21.0

  # --- Testes ---
  mocktail: ^1.0.4

  # --- Ícones do app (launcher) ---
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo/

# Ícones de launcher gerados a partir do escudo do NoxPass.
# Regerar com: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/logo/icon_full.png"
  # Android: ícone adaptativo (fundo + primeiro plano na zona segura).
  android: "ic_launcher"
  adaptive_icon_background: "#0E0E15"
  adaptive_icon_foreground: "assets/logo/icon_foreground.png"
  min_sdk_android: 24
  # iOS não permite transparência: usa a versão com fundo.
  ios: true
  remove_alpha_ios: true
  # Desktop e web.
  windows:
    generate: true
    image_path: "assets/logo/icon_full.png"
  macos:
    generate: true
    image_path: "assets/logo/icon_full.png"
